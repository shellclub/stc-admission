name: Deploy STC Admission

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production Server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # ─── Set project directory ─────────────────────────
            PROJECT_DIR="/opt/stc-admission"
            
            # ─── Install Docker & Docker Compose if not present ─────
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              yum install -y yum-utils
              yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
              yum install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              systemctl start docker
              systemctl enable docker
            fi
            
            # ─── Install docker-compose standalone if needed ────
            if ! command -v docker-compose &> /dev/null && ! docker compose version &> /dev/null; then
              echo "Installing docker-compose..."
              curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              chmod +x /usr/local/bin/docker-compose
            fi
            
            # ─── Clone or pull latest code ─────────────────────
            if [ -d "$PROJECT_DIR" ]; then
              echo "Pulling latest changes..."
              cd $PROJECT_DIR
              git fetch --all
              git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
              git pull
            else
              echo "Cloning repository..."
              git clone https://github.com/shellclub/stc-admission.git $PROJECT_DIR
              cd $PROJECT_DIR
            fi
            
            # ─── Build and deploy with Docker Compose ──────────
            echo "Building and deploying..."
            cd $PROJECT_DIR
            
            # Stop existing containers if running
            docker-compose down 2>/dev/null || docker compose down 2>/dev/null || true
            
            # Build and start
            docker-compose up -d --build 2>/dev/null || docker compose up -d --build
            
            # ─── Verify deployment ─────────────────────────────
            echo "Waiting for services to start..."
            sleep 10
            
            echo "=== Container Status ==="
            docker-compose ps 2>/dev/null || docker compose ps
            
            echo ""
            echo "=== Deployment Complete ==="
            echo "Web:        http://${{ secrets.SERVER_HOST }}:8085"
            echo "phpMyAdmin: http://${{ secrets.SERVER_HOST }}:8888"
