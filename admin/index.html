<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>ระบบจัดการ Admin Page</title>
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
  
  <link rel="stylesheet" href="../bower_components/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../bower_components/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="../dist/css/AdminLTE.min.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Prompt', sans-serif !important;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; /* พื้นหลังไล่เฉดสี */
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      margin: 0;
      width: 400px;
    }

    .login-logo b {
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      font-weight: 600;
      letter-spacing: 1px;
    }

    .login-box-body {
      border-radius: 15px; /* ความโค้งมน */
      box-shadow: 0 15px 35px rgba(0,0,0,0.2); /* เพิ่มเงา */
      padding: 30px;
      background: rgba(255, 255, 255, 0.95);
    }

    .login-box-msg {
      font-size: 1.1em;
      color: #555;
      padding-bottom: 25px;
    }

    .form-control {
      border-radius: 8px;
      height: 45px;
      border: 1px solid #ddd;
      box-shadow: none;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: #764ba2;
      box-shadow: 0 0 8px rgba(118, 75, 162, 0.2);
    }

    .btn-primary {
      background: linear-gradient(to right, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      height: 45px;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
    }

    .has-feedback .form-control-feedback {
      line-height: 45px;
      color: #aaa;
    }
    
    /* ปรับแต่งไอคอนให้ตรงกับ Input */
    .form-group { margin-bottom: 20px; }
  </style>
</head>
<body class="hold-transition login-page">

<div class="login-box">
  <div class="login-logo">
    <b>EXAM</b> SYSTEM
  </div>
  
  <div class="login-box-body">
    <p class="login-box-msg">ลงชื่อเข้าใช้งานระบบสอบเข้าวิทยาลัยเทคนิคสุพรรณบุรี</p>

    <form action="check_data.php" method="post">
      <div class="form-group has-feedback">
        <input type="text" class="form-control" name="user" id="user" placeholder="Username" required>
        <span class="glyphicon glyphicon-user form-control-feedback"></span>
      </div>
      <div class="form-group has-feedback">
        <input type="password" name="pass" id="pass" class="form-control" placeholder="Password" required>
        <span class="glyphicon glyphicon-lock form-control-feedback"></span>
      </div>
      
      <div class="row">
        <div class="col-xs-12">
          <button type="submit" class="btn btn-primary btn-block btn-flat">
            <i class="fa fa-sign-in"></i> เข้าสู่ระบบ
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="../bower_components/jquery/dist/jquery.min.js"></script>
<script src="../bower_components/bootstrap/dist/js/bootstrap.min.js"></script>
</body>
</html>
